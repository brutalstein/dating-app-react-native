spring.application.name=backend
spring.profiles.default=${SPRING_PROFILES_DEFAULT:dev}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bloomDb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate (profile-specific hardening in application-*.properties)
spring.jpa.open-in-view=false

# Flyway migration hardening
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=${FLYWAY_VALIDATE_ON_MIGRATE:true}
spring.flyway.validate-migration-naming=${FLYWAY_VALIDATE_MIGRATION_NAMING:true}
spring.flyway.out-of-order=${FLYWAY_OUT_OF_ORDER:false}
spring.flyway.clean-disabled=${FLYWAY_CLEAN_DISABLED:true}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.baseline-version=${FLYWAY_BASELINE_VERSION:1}
spring.flyway.table=${FLYWAY_SCHEMA_HISTORY_TABLE:flyway_schema_history}
spring.flyway.default-schema=${FLYWAY_DEFAULT_SCHEMA:public}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:dpu.forum.noreply@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT Security Configuration
# CRITICAL: Set a strong secret in production using: openssl rand -base64 64
JWT_SECRET=${JWT_SECRET:}
JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:3600000}
JWT_REFRESH_EXPIRATION_MS=${JWT_REFRESH_EXPIRATION_MS:604800000}

# CORS Configuration
# Comma-separated list of allowed origins. Leave empty for dev mode (localhost only)
CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:}

# Rate limiting / abuse protection (override with env vars in production)
app.rate-limit.default-limit=${RATE_LIMIT_DEFAULT_LIMIT:120}
app.rate-limit.default-window-seconds=${RATE_LIMIT_DEFAULT_WINDOW_SECONDS:60}
app.rate-limit.auth-limit=${RATE_LIMIT_AUTH_LIMIT:12}
app.rate-limit.auth-window-seconds=${RATE_LIMIT_AUTH_WINDOW_SECONDS:60}
app.rate-limit.critical-limit=${RATE_LIMIT_CRITICAL_LIMIT:40}
app.rate-limit.critical-window-seconds=${RATE_LIMIT_CRITICAL_WINDOW_SECONDS:60}
app.rate-limit.explore-hub-limit=${RATE_LIMIT_EXPLORE_HUB_LIMIT:480}
app.rate-limit.explore-hub-window-seconds=${RATE_LIMIT_EXPLORE_HUB_WINDOW_SECONDS:60}
app.rate-limit.auth-failure-threshold=${RATE_LIMIT_AUTH_FAILURE_THRESHOLD:5}
app.rate-limit.auth-failure-base-block-seconds=${RATE_LIMIT_AUTH_FAILURE_BASE_BLOCK_SECONDS:30}
app.rate-limit.auth-failure-max-block-seconds=${RATE_LIMIT_AUTH_FAILURE_MAX_BLOCK_SECONDS:900}
app.rate-limit.message-flood-limit=${RATE_LIMIT_MESSAGE_FLOOD_LIMIT:15}
app.rate-limit.message-flood-window-seconds=${RATE_LIMIT_MESSAGE_FLOOD_WINDOW_SECONDS:20}

# Dummy engagement simulation (disabled by default to avoid noisy background traffic)
bloom.simulation.dummy.enabled=${DUMMY_SIMULATION_ENABLED:false}
bloom.simulation.dummy.fixed-delay-ms=${DUMMY_SIMULATION_DELAY_MS:45000}

# Dev-only dummy chat flow (seed initial NPC conversation + deterministic auto-replies)
bloom.chat.dummy.enabled=${BLOOM_DUMMY_CHAT_ENABLED:false}

# Push integrations
app.push.enabled=${PUSH_ENABLED:true}
app.push.fcm-server-key=${FCM_SERVER_KEY:}
app.push.fcm-url=${FCM_URL:https://fcm.googleapis.com/fcm/send}
app.push.apns-key-id=${APNS_KEY_ID:}
app.push.apns-team-id=${APNS_TEAM_ID:}
app.push.apns-bundle-id=${APNS_BUNDLE_ID:}
app.push.apns-private-key=${APNS_PRIVATE_KEY:}
app.push.apns-sandbox=${APNS_SANDBOX:true}
